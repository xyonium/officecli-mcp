services:
  officecli-mcp:
    build: .
    image: officecli-mcp:latest
    container_name: officecli-mcp
    ports:
      - "8765:8765"
    volumes:
      - officecli-data:/data
      - officecli-work:/work
    environment:
      OFFICECLI_MCP_TRANSPORT: http
      OFFICECLI_MCP_HOST: 0.0.0.0
      OFFICECLI_MCP_PORT: "8765"
      # Comma-separated Host headers the /mcp endpoint is reachable by. OpenWebUI
      # calls http://officecli-mcp:8765/mcp across the docker network, so the
      # inbound Host header is "officecli-mcp:8765" — allow-list it or the MCP
      # SDK's DNS-rebinding guard returns 421 "Invalid Host header". Use "host:*"
      # to allow any port on <host>. Unset = localhost-only.
      OFFICECLI_MCP_ALLOWED_HOSTS: "officecli-mcp:8765,localhost:8765,127.0.0.1:8765"
      # OFFICECLI_MCP_DNS_REBINDING_PROTECTION: "1"  # default on; "0" disables the Host/Origin guard
      # OFFICECLI_MCP_API_KEY: set-to-lock-down-the-http-surface
      # OFFICECLI_SHA256: optional-pin
      # Optional: auto-create/update the officecli tool in OpenWebUI on
      # boot (shim self-sync). Requires an OpenWebUI ADMIN API key and network
      # reachability to OpenWebUI — see docs/deployment-self-sync.md for a
      # worked example (env wiring + joining OpenWebUI's network). Without
      # these, sync is skipped (manual paste mode).
      # OFFICECLI_MCP_OWUI_URL: "http://open-webui:8080"
      # OFFICECLI_MCP_OWUI_API_KEY: "sk-..."   # admin API key - keep secret
      # OFFICECLI_MCP_SCREENSHOT_MAX_EDGE: "1024"
    restart: unless-stopped

  # Reference: OpenWebUI connects to http://officecli-mcp:8765/mcp (native MCP,
  # streamable-HTTP) and POSTs uploads to http://officecli-mcp:8765/files via
  # the officecli_file native tool (examples/openwebui_officecli_file.py).

volumes:
  officecli-data:
  officecli-work:
